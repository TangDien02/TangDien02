name: Update Stats Card
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Bước 1: Tạo thẻ Stats cá nhân
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=TangDien02&show_icons=true&theme=radical
          path: profile-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Bước 2: Tạo thẻ Top Langs (Ngôn ngữ sử dụng nhiều nhất)
      - name: Generate Top Langs Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=TangDien02&theme=radical
          path: top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Bước 3: Lưu tất cả thay đổi vào kho lưu trữ
      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile-stats.svg top-langs.svg
          git commit -m "Update profile cards" || exit 0
          git push
